# Publishes the static results dashboard to GitHub Pages.
# The dashboard/ folder is uploaded as the site root, so dashboard/index.html
# is served at the Pages URL and its ./charts/ assets resolve alongside it.
# One-time setup: repo Settings -> Pages -> Source: GitHub Actions.

name: Deploy dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Minimum permissions for the Pages deployment to authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish but supersede queued ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - id: deployment
        uses: actions/deploy-pages@v4
